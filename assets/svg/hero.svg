<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">
<defs>
  <radialGradient id="bg" cx="58%" cy="46%" r="82%">
    <stop offset="0%" stop-color="#0b2c4d"/>
    <stop offset="45%" stop-color="#061426"/>
    <stop offset="100%" stop-color="#020611"/>
  </radialGradient>
  <linearGradient id="brandGrad" x1="0%" x2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="42%" stop-color="#78ddff"/>
    <stop offset="100%" stop-color="#ff8a24"/>
  </linearGradient>
  <linearGradient id="energy" x1="0%" x2="100%">
    <stop offset="0%" stop-color="#28a7ff"/>
    <stop offset="55%" stop-color="#78ddff"/>
    <stop offset="100%" stop-color="#ff8a24"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="deepGlow">
    <feGaussianBlur stdDeviation="18" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softBlur"><feGaussianBlur stdDeviation="24"/></filter>
  <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
    <path d="M56 0H0V56" fill="none" stroke="#78ddff" stroke-opacity=".07"/>
  </pattern>
  <style>
    .ringA{animation:spin 38s linear infinite;transform-origin:1040px 455px}
    .ringB{animation:spinR 54s linear infinite;transform-origin:1040px 455px}
    .ringC{animation:spin 24s linear infinite;transform-origin:1040px 455px}
    .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}
    .float{animation:float 5s ease-in-out infinite}
    .dash{stroke-dasharray:18 18;animation:dash 3.4s linear infinite}
    .shine{animation:shine 6s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spinR{to{transform:rotate(-360deg)}}
    @keyframes dash{to{stroke-dashoffset:-180}}
    @keyframes pulse{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shine{0%,100%{opacity:.18}50%{opacity:.75}}
  </style>
</defs>

<rect width="1800" height="900" fill="url(#bg)"/>
<rect width="1800" height="900" fill="url(#grid)"/>

<circle cx="1330" cy="440" r="460" fill="#ff8a24" opacity=".08" filter="url(#softBlur)"/>
<circle cx="610" cy="390" r="560" fill="#28a7ff" opacity=".12" filter="url(#softBlur)"/>

<g opacity=".28" filter="url(#glow)">
  <path class="dash" d="M120 575 C410 345 620 330 900 455 S1320 645 1650 390" fill="none" stroke="#28a7ff" stroke-width="3"/>
  <path class="dash" d="M130 655 C450 500 680 430 965 530 S1320 720 1665 515" fill="none" stroke="#ff8a24" stroke-width="3"/>
  <path class="dash" d="M260 295 C620 135 1130 145 1530 300" fill="none" stroke="#78ddff" stroke-width="2"/>
</g>

<g transform="translate(1040 455)" filter="url(#deepGlow)">
  <g class="ringA"><circle r="330" fill="none" stroke="#28a7ff" stroke-opacity=".22" stroke-width="2" stroke-dasharray="10 16"/></g>
  <g class="ringB"><circle r="270" fill="none" stroke="#78ddff" stroke-opacity=".32" stroke-width="2" stroke-dasharray="4 12"/></g>
  <g class="ringC"><circle r="205" fill="none" stroke="#ff8a24" stroke-opacity=".34" stroke-width="2" stroke-dasharray="18 12"/></g>
  <circle r="150" fill="none" stroke="#28a7ff" stroke-opacity=".7" stroke-width="4"/>
  <circle r="112" fill="#020611" stroke="#78ddff" stroke-opacity=".75" stroke-width="2"/>
  <circle class="pulse" r="62" fill="#28a7ff" opacity=".18"/>
  <path d="M0 -66 L50 -28 L50 42 L0 72 L-50 42 L-50 -28Z" fill="none" stroke="#78ddff" stroke-width="3"/>
  <text y="-10" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="900" fill="#78ddff" letter-spacing="6">OWNER</text>
  <text y="34" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="44" font-weight="950" fill="#ffffff">RECOVERY</text>
  <text y="67" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="15" font-weight="900" fill="#9db0c9" letter-spacing="5">CONTINUITY REACTOR</text>
</g>

<g transform="translate(1040 455)" filter="url(#glow)" font-family="Inter,Segoe UI,Arial" font-weight="900">
  <line class="dash" x1="-252" y1="-185" x2="-100" y2="-70" stroke="#78ddff" stroke-width="3"/>
  <line class="dash" x1="252" y1="-185" x2="100" y2="-70" stroke="#78ddff" stroke-width="3"/>
  <line class="dash" x1="-280" y1="145" x2="-115" y2="58" stroke="#ff8a24" stroke-width="3"/>
  <line class="dash" x1="280" y1="145" x2="115" y2="58" stroke="#ff8a24" stroke-width="3"/>
  <g class="float"><circle cx="-285" cy="-210" r="38" fill="#071426" stroke="#78ddff" stroke-width="3"/><text x="-285" y="-268" text-anchor="middle" font-size="20" fill="#fff">DETECT</text></g>
  <g class="float" style="animation-delay:.6s"><circle cx="285" cy="-210" r="38" fill="#071426" stroke="#78ddff" stroke-width="3"/><text x="285" y="-268" text-anchor="middle" font-size="20" fill="#fff">DISTRIBUTE</text></g>
  <g class="float" style="animation-delay:1.2s"><circle cx="-305" cy="165" r="38" fill="#071426" stroke="#ff8a24" stroke-width="3"/><text x="-305" y="226" text-anchor="middle" font-size="20" fill="#fff">PROOF</text></g>
  <g class="float" style="animation-delay:1.8s"><circle cx="305" cy="165" r="38" fill="#071426" stroke="#ff8a24" stroke-width="3"/><text x="305" y="226" text-anchor="middle" font-size="20" fill="#fff">CONTINUE</text></g>
</g>

<g transform="translate(105 150)" font-family="Inter,Segoe UI,Arial">
  <text font-size="116" font-weight="950" fill="#ffffff" letter-spacing="-6">XPADI</text>
  <text y="124" font-size="128" font-weight="950" fill="url(#brandGrad)" letter-spacing="-7">SGDS</text>
  <text y="178" font-size="22" font-weight="900" fill="#78ddff" letter-spacing="11">SURVIVABILITY-GOVERNED DATA SYSTEMS</text>
  <text y="260" font-size="44" font-weight="950" fill="#ffffff">Attack Success <tspan fill="#ff8a24">≠ Data Loss</tspan></text>
  <text y="320" font-size="26" fill="#b9c9dc">Deterministic reconstruction • fragment intelligence • owner recovery authority</text>
  <rect y="370" width="520" height="66" rx="21" fill="#061426" stroke="#28a7ff" stroke-opacity=".62"/>
  <text x="34" y="412" font-size="21" font-weight="950" fill="#78ddff">PUBLIC RESEARCH SURFACE</text>
</g>

<g class="shine" transform="translate(110 720)" font-family="Inter,Segoe UI,Arial" font-weight="900">
  <rect width="1580" height="96" rx="28" fill="#061426" opacity=".82" stroke="#78ddff" stroke-opacity=".25"/>
  <text x="45" y="60" font-size="23" fill="#78ddff" letter-spacing="6">CORE SIGNAL</text>
  <text x="355" y="62" font-size="34" fill="#ffffff">Continuity is the Future. <tspan fill="#28a7ff">Survivability is the Foundation.</tspan></text>
</g>
</svg>