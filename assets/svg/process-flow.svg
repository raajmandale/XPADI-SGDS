<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="720" viewBox="0 0 1920 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">XPADI-SGDS Advanced Survivability Flow</title>
<desc id="desc">Animated White Blue Orange advanced process flow for XPADI-SGDS: detect, split, distribute, rebuild, verify, continue.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="48%" stop-color="#eef8ff"/>
    <stop offset="100%" stop-color="#fff3e6"/>
  </linearGradient>

  <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0077ff"/>
    <stop offset="46%" stop-color="#42caff"/>
    <stop offset="72%" stop-color="#ff9f2f"/>
    <stop offset="100%" stop-color="#ff6b00"/>
  </linearGradient>

  <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
    <stop offset="100%" stop-color="#eaf8ff" stop-opacity="0.70"/>
  </linearGradient>

  <filter id="softShadow">
    <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0077ff" flood-opacity="0.12"/>
  </filter>

  <filter id="orangeGlow">
    <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ff8a00" flood-opacity="0.45"/>
  </filter>

  <filter id="blueGlow">
    <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#00aaff" flood-opacity="0.45"/>
  </filter>

  <style>
    .title{font:900 54px Arial,Helvetica,sans-serif;fill:#06172b;letter-spacing:-1px}
    .subtitle{font:600 20px Arial,Helvetica,sans-serif;fill:#406078}
    .kicker{font:900 13px Arial,Helvetica,sans-serif;letter-spacing:4px;fill:#0077ff}
    .stepTitle{font:900 24px Arial,Helvetica,sans-serif;fill:#06172b}
    .stepSub{font:600 15px Arial,Helvetica,sans-serif;fill:#4b6478}
    .num{font:900 14px Arial,Helvetica,sans-serif;letter-spacing:3px;fill:#0077ff}
    .lane{stroke:url(#flow);stroke-width:8;fill:none;stroke-linecap:round;stroke-dasharray:20 18;animation:dash 8s linear infinite}
    .thinLane{stroke:#0077ff;stroke-opacity:.22;stroke-width:2;fill:none;stroke-dasharray:9 12;animation:dash 12s linear infinite}
    .nodePulse{animation:pulse 3.4s ease-in-out infinite}
    .floatA{animation:floatA 6s ease-in-out infinite}
    .floatB{animation:floatB 7.5s ease-in-out infinite}
    .scan{animation:scan 5.8s ease-in-out infinite}
    @keyframes dash{to{stroke-dashoffset:-260}}
    @keyframes pulse{0%,100%{opacity:.48;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
    @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
    @keyframes scan{0%,100%{opacity:.06;transform:translateX(-90px)}50%{opacity:.18;transform:translateX(90px)}}
  </style>
</defs>

<rect width="1920" height="720" fill="url(#bg)"/>

<g opacity=".38">
  <path d="M0 90H1920M0 180H1920M0 270H1920M0 360H1920M0 450H1920M0 540H1920M0 630H1920" stroke="#7ccfff" stroke-opacity=".22"/>
  <path d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720M1200 0V720M1320 0V720M1440 0V720M1560 0V720M1680 0V720M1800 0V720" stroke="#7ccfff" stroke-opacity=".16"/>
</g>

<circle cx="240" cy="620" r="220" fill="#0077ff" opacity=".05"/>
<circle cx="1660" cy="120" r="250" fill="#ff9f2f" opacity=".08"/>
<circle cx="980" cy="350" r="300" fill="#42caff" opacity=".045"/>

<text x="80" y="82" class="kicker">XPADI-SGDS SURVIVABILITY PROCESS</text>
<text x="80" y="145" class="title">From Failure Signal to Continuity Proof</text>
<text x="80" y="184" class="subtitle">A reconstruction-first flow for fragment-aware, owner-centered data survivability.</text>

<!-- Advanced main flow path -->
<path class="thinLane" d="M165 430 C330 300 460 500 610 380 C760 260 900 500 1040 380 C1190 250 1340 500 1490 380 C1600 290 1710 345 1790 300"/>
<path class="lane" d="M165 430 C330 300 460 500 610 380 C760 260 900 500 1040 380 C1190 250 1340 500 1490 380 C1600 290 1710 345 1790 300"/>

<!-- Energy packets -->
<circle r="10" fill="#0077ff" filter="url(#blueGlow)">
  <animateMotion dur="7s" repeatCount="indefinite" path="M165 430 C330 300 460 500 610 380 C760 260 900 500 1040 380 C1190 250 1340 500 1490 380 C1600 290 1710 345 1790 300"/>
</circle>
<circle r="8" fill="#ff9f2f" filter="url(#orangeGlow)">
  <animateMotion dur="7s" begin="1.3s" repeatCount="indefinite" path="M165 430 C330 300 460 500 610 380 C760 260 900 500 1040 380 C1190 250 1340 500 1490 380 C1600 290 1710 345 1790 300"/>
</circle>
<circle r="7" fill="#42caff" filter="url(#blueGlow)">
  <animateMotion dur="7s" begin="2.6s" repeatCount="indefinite" path="M165 430 C330 300 460 500 610 380 C760 260 900 500 1040 380 C1190 250 1340 500 1490 380 C1600 290 1710 345 1790 300"/>
</circle>

<!-- Step nodes -->
<g class="floatA" filter="url(#softShadow)">
  <rect x="70" y="330" width="220" height="165" rx="34" fill="url(#glass)" stroke="#54caff" stroke-width="2"/>
  <circle cx="110" cy="370" r="20" fill="#0077ff" opacity=".12" class="nodePulse"/>
  <text x="95" y="374" class="num">01</text>
  <text x="95" y="426" class="stepTitle">DETECT</text>
  <text x="95" y="462" class="stepSub">loss, corruption, attack</text>
</g>

<g class="floatB" filter="url(#softShadow)">
  <rect x="370" y="255" width="220" height="165" rx="34" fill="url(#glass)" stroke="#54caff" stroke-width="2"/>
  <circle cx="410" cy="295" r="20" fill="#0077ff" opacity=".12" class="nodePulse"/>
  <text x="395" y="299" class="num">02</text>
  <text x="395" y="351" class="stepTitle">SPLIT</text>
  <text x="395" y="387" class="stepSub">fragment-aware structure</text>
</g>

<g class="floatA" filter="url(#softShadow)">
  <rect x="685" y="330" width="245" height="165" rx="34" fill="url(#glass)" stroke="#54caff" stroke-width="2"/>
  <circle cx="725" cy="370" r="20" fill="#0077ff" opacity=".12" class="nodePulse"/>
  <text x="710" y="374" class="num">03</text>
  <text x="710" y="426" class="stepTitle">DISTRIBUTE</text>
  <text x="710" y="462" class="stepSub">no single full target</text>
</g>

<g class="floatB" filter="url(#softShadow)">
  <rect x="1000" y="255" width="230" height="165" rx="34" fill="url(#glass)" stroke="#ff9f2f" stroke-width="2"/>
  <circle cx="1040" cy="295" r="20" fill="#ff9f2f" opacity=".16" class="nodePulse"/>
  <text x="1025" y="299" class="num" fill="#ff7a00">04</text>
  <text x="1025" y="351" class="stepTitle">REBUILD</text>
  <text x="1025" y="387" class="stepSub">deterministic recovery</text>
</g>

<g class="floatA" filter="url(#softShadow)">
  <rect x="1320" y="330" width="220" height="165" rx="34" fill="url(#glass)" stroke="#ff9f2f" stroke-width="2"/>
  <circle cx="1360" cy="370" r="20" fill="#ff9f2f" opacity=".16" class="nodePulse"/>
  <text x="1345" y="374" class="num" fill="#ff7a00">05</text>
  <text x="1345" y="426" class="stepTitle">VERIFY</text>
  <text x="1345" y="462" class="stepSub">proof and readiness</text>
</g>

<g class="floatB" filter="url(#softShadow)">
  <rect x="1630" y="210" width="220" height="165" rx="34" fill="url(#glass)" stroke="#ff9f2f" stroke-width="2"/>
  <circle cx="1670" cy="250" r="20" fill="#ff9f2f" opacity=".16" class="nodePulse"/>
  <text x="1655" y="254" class="num" fill="#ff7a00">06</text>
  <text x="1655" y="306" class="stepTitle">CONTINUE</text>
  <text x="1655" y="342" class="stepSub">survivable operation</text>
</g>

<!-- lower meaning strip -->
<g filter="url(#softShadow)">
  <rect x="330" y="585" width="1260" height="70" rx="35" fill="#ffffff" opacity=".7" stroke="#b9e8ff"/>
  <text x="410" y="629" style="font:800 20px Arial;fill:#06172b">XPADI principle:</text>
  <text x="620" y="629" style="font:700 20px Arial;fill:#355570">failure is not final when reconstruction, proof, and owner recovery are built into the system.</text>
</g>

<rect x="-140" y="0" width="160" height="720" fill="#ffffff" opacity=".38" class="scan"/>
</svg>
