<?xml version="1.0" encoding="UTF-8"?>
<svg width="2200" height="1400" viewBox="0 0 2200 1400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">XPADI-SGDS Glass Edition 2050 Architecture</title>
<desc id="desc">Animated glass architecture constellation showing XPADI-SGDS as central survivability hub with related repositories.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="15%" r="90%">
    <stop offset="0%" stop-color="#123b65"/>
    <stop offset="52%" stop-color="#061120"/>
    <stop offset="100%" stop-color="#030613"/>
  </radialGradient>
  <linearGradient id="wire" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#9ef7ff"/>
    <stop offset="46%" stop-color="#58ffb1"/>
    <stop offset="75%" stop-color="#ff9f43"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#143a62" stop-opacity=".62"/>
    <stop offset="58%" stop-color="#08172e" stop-opacity=".76"/>
    <stop offset="100%" stop-color="#1a1028" stop-opacity=".64"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
    <path d="M70 0H0V70" fill="none" stroke="#9ef7ff" stroke-opacity=".05" stroke-width="1"/>
  </pattern>
  <style>
    .title{font:900 62px Arial,Helvetica,sans-serif;fill:#f8fbff}
    .sub{font:600 23px Arial,Helvetica,sans-serif;fill:#bdd7ee}
    .kicker{font:900 17px Arial,Helvetica,sans-serif;letter-spacing:4px;fill:#9ef7ff}
    .ct{font:900 30px Arial,Helvetica,sans-serif;fill:#ffffff}
    .cb{font:600 18px Arial,Helvetica,sans-serif;fill:#cbd7ec}
    .wire{stroke:url(#wire);stroke-width:4;fill:none;stroke-dasharray:18 18;animation:dash 10s linear infinite;filter:url(#glow)}
    .wire2{stroke:#9ef7ff;stroke-opacity:.36;stroke-width:2;fill:none;stroke-dasharray:8 12;animation:dash 14s linear infinite}
    .pulse{animation:pulse 4s ease-in-out infinite}
    .float1{animation:float1 7s ease-in-out infinite}
    .float2{animation:float2 9s ease-in-out infinite}
    @keyframes dash{to{stroke-dashoffset:-260}}
    @keyframes pulse{0%,100%{opacity:.28}50%{opacity:1}}
    @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
  </style>
</defs>

<rect width="2200" height="1400" fill="url(#bg)"/>
<rect width="2200" height="1400" fill="url(#grid)"/>

<text x="90" y="105" class="kicker">GLASS EDITION 2050 · XPADI-DISK SURVIVABILITY SURFACE</text>
<text x="90" y="180" class="title">XPADI-SGDS Architecture Constellation</text>
<text x="90" y="224" class="sub">Canonical hub connecting proof, reconstruction, origin architecture, fragment-graph research and AI continuity.</text>

<circle cx="1100" cy="690" r="460" fill="#54d6ff" opacity=".045" class="pulse"/>
<circle cx="1100" cy="690" r="310" fill="#58ffb1" opacity=".04" class="pulse"/>
<circle cx="1100" cy="690" r="180" fill="#ff9f43" opacity=".035" class="pulse"/>

<path class="wire" d="M1100 565 C860 430 650 350 440 330"/>
<path class="wire" d="M1100 565 C1345 430 1550 350 1760 330"/>
<path class="wire" d="M980 815 C780 960 610 1040 430 1075"/>
<path class="wire" d="M1100 850 C1100 940 1100 1020 1100 1080"/>
<path class="wire" d="M1220 815 C1425 960 1580 1040 1770 1075"/>
<path class="wire2" d="M440 330 C780 220 1420 220 1760 330"/>
<path class="wire2" d="M430 1075 C760 1245 1450 1245 1770 1075"/>

<g filter="url(#glow)" class="float1">
  <rect x="755" y="500" width="690" height="370" rx="46" fill="url(#glass)" stroke="url(#wire)" stroke-width="3"/>
  <text x="830" y="592" class="kicker">CANONICAL SURVIVABILITY HUB</text>
  <text x="830" y="680" font-family="Arial" font-size="78" font-weight="900" fill="#ffffff">XPADI-SGDS</text>
  <text x="835" y="737" class="sub">Survivability-Governed Data Systems</text>
  <text x="835" y="790" class="cb">One public surface for XPADI proof, recovery,</text>
  <text x="835" y="824" class="cb">fragment intelligence and AI-era continuity.</text>
</g>

<g filter="url(#glow)" class="float2">
  <rect x="120" y="225" width="640" height="250" rx="38" fill="url(#glass)" stroke="#54d6ff" stroke-width="2.5"/>
  <text x="178" y="300" class="kicker">MAIN PUBLIC SURFACE</text>
  <text x="178" y="365" class="ct">XPADI-ProofCheck™</text>
  <text x="178" y="418" class="cb">Recovery Intelligence &amp; Survivability Proof</text>
</g>

<g filter="url(#glow)" class="float2">
  <rect x="1440" y="225" width="640" height="250" rx="38" fill="url(#glass)" stroke="#58ffb1" stroke-width="2.5"/>
  <text x="1498" y="300" class="kicker">DETERMINISTIC ENGINE</text>
  <text x="1498" y="365" class="ct">XPADI_Proof_Engine_V1</text>
  <text x="1498" y="418" class="cb">Protect → attack → reconstruct → verify</text>
</g>

<g filter="url(#glow)" class="float1">
  <rect x="120" y="950" width="620" height="250" rx="38" fill="url(#glass)" stroke="#ff9f43" stroke-width="2.5"/>
  <text x="178" y="1025" class="kicker">ORIGIN ARCHITECTURE</text>
  <text x="178" y="1090" class="ct">digital-lifeline</text>
  <text x="178" y="1143" class="cb">Fragment → encrypt → distribute → reconstruct</text>
</g>

<g filter="url(#glow)" class="float1">
  <rect x="790" y="1010" width="620" height="250" rx="38" fill="url(#glass)" stroke="#f472b6" stroke-width="2.5"/>
  <text x="848" y="1085" class="kicker">AI CONTINUITY BRANCH</text>
  <text x="848" y="1150" class="ct">XLifelineAI</text>
  <text x="848" y="1203" class="cb">RUN → FAIL → DETECT → REBUILD → CONTINUE</text>
</g>

<g filter="url(#glow)" class="float1">
  <rect x="1460" y="950" width="620" height="250" rx="38" fill="url(#glass)" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="1518" y="1025" class="kicker">FRAGMENT GRAPH RESEARCH</text>
  <text x="1518" y="1090" class="ct">dfg-demo-lab</text>
  <text x="1518" y="1143" class="cb">Deterministic Fragment Graph research layer</text>
</g>

<text x="90" y="1315" class="sub">Boundary: public-safe ecosystem map; private recovery internals and authority logic remain undisclosed.</text>
</svg>
